<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Cinema Browser</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0c0c0c;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 25px;
            background: #141414;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        header h1 {
            color: #E50914;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
        }

        .search-box {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 450px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: #E50914;
        }

        .search-box button {
            padding: 10px 22px;
            background: #E50914;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar Component Layout */
        .sidebar {
            width: 360px;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-size: 1rem;
            padding: 15px 20px;
            color: #888;
            border-bottom: 1px solid #222;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .movie-card {
            display: flex;
            gap: 15px;
            background: #181818;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .movie-card:hover {
            border-color: #333;
            background: #222;
            transform: translateX(2px);
        }

        .movie-card img {
            width: 65px;
            height: 95px;
            object-fit: cover;
            border-radius: 6px;
            background: #000;
        }

        .movie-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .movie-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .movie-meta {
            font-size: 0.8rem;
            color: #777;
        }

        /* Theater Area */
        .main-theater {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #050505;
            overflow-y: auto;
        }

        .player-viewport {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Cinema Aspect Ratio */
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 1px solid #222;
        }

        /* Protective Invisible Shield Layer */
        #adShield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.01); 
            cursor: pointer;
            display: none; 
        }

        .player-viewport iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* TV Controls Navigation */
        .tv-controls {
            background: #141414;
            padding: 15px 20px;
            border-radius: 8px;
            display: none;
            gap: 20px;
            align-items: center;
            border: 1px solid #222;
        }

        .tv-controls label {
            font-size: 0.85rem;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 5px;
        }

        .tv-controls input {
            width: 65px;
            padding: 8px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        .tv-controls button {
            padding: 9px 18px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-left: auto;
        }
        .tv-controls button:hover {
            background: #E50914;
            border-color: #E50914;
        }
    </style>
</head>
<body>

    <header>
        <h1>Secure Theater</h1>
        <div class="search-box">
            <input type="text" id="searchQuery" placeholder="Search across millions of titles...">
            <button onclick="searchMedia()">Search</button>
        </div>
    </header>

    <div class="app-body">
        <div class="sidebar">
            <h2 id="sidebarTitle">Trending Dynamic Feeds</h2>
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="main-theater">
            <div class="player-viewport">
                <div id="adShield" onclick="neutralizeShield()" title="Click once to clear safety shield, then hit play."></div>
                
                <iframe 
                    id="videoPlayer"
                    src="about:blank" 
                    frameborder="0" 
                    allowfullscreen 
                    allow="encrypted-media">
                </iframe>
            </div>

            <div class="tv-controls" id="tvControls">
                <div>
                    <label>Season</label>
                    <input type="number" id="seasonNum" value="1" min="1" onchange="loadTvMedia()">
                </div>
                <div>
                    <label>Episode</label>
                    <input type="number" id="episodeNum" value="1" min="1" onchange="loadTvMedia()">
                </div>
                <button onclick="changeEpisode(1)">Next Ep ➔</button>
            </div>
        </div>
    </div>

    <script>
        // Paste your long TMDB API Read Access Token string here:
        const TMDB_ACCESS_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIzYzMwZjRiMThjZTc0ODlmMzgzNDE2YzEwMmI0MjgwMyIsIm5iZiI6MTc4MDk0NzE2MS4wMTIsInN1YiI6IjZhMjcxOGQ5NzUwMTQ4Y2IxZWMzMzQ1YiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.2rw1VFYZHjDv8e7STG_HOBxqtYT6vTxmY5WvvoBebwY";

        let currentMediaId = ''; 
        let currentMediaType = 'movie'; 
        let shieldClicks = 0;

        const fetchOptions = {
            method: 'GET',
            headers: {
                accept: 'application/json',
                Authorization: `Bearer ${TMDB_ACCESS_TOKEN}`
            }
        };

        window.onload = function() {
            if (TMDB_ACCESS_TOKEN === "YOUR_TMDB_API_READ_ACCESS_TOKEN_HERE") {
                alert("Please add your TMDB API Read Access Token inside the script context block to activate searches!");
                return;
            }
            fetchTrending();
        };

        // Shield Controls: Absorbs the first 2 malicious clicks on the player area
        function armShield() {
            const shield = document.getElementById('adShield');
            shield.style.display = 'block'; 
            shieldClicks = 0; 
        }

        function neutralizeShield() {
            shieldClicks++;
            if (shieldClicks >= 2) { // Drops after absorbing 2 clicks
                const shield = document.getElementById('adShield');
                shield.style.display = 'none';
                console.log("Shield dropped. Native player exposed.");
            } else {
                console.log(`Shield absorbed click #${shieldClicks}`);
            }
        }

        async function fetchTrending() {
            try {
                const response = await fetch('https://api.themoviedb.org/3/trending/all/day?language=en-US', fetchOptions);
                const data = await response.json();
                renderCards(data.results);
            } catch (err) {
                console.error("Failed handling API processing streams:", err);
            }
        }

        async function searchMedia() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) return;

            document.getElementById('sidebarTitle').innerText = `Results: ${query}`;
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/multi?query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`, fetchOptions);
                const data = await response.json();
                const filteredResults = data.results.filter(item => item.media_type === 'movie' || item.media_type === 'tv');
                renderCards(filteredResults);
            } catch (err) {
                console.error("Query structural lookup error encountered:", err);
            }
        }

        function renderCards(items) {
            const container = document.getElementById('resultsList');
            container.innerHTML = '';

            if(items.length === 0) {
                container.innerHTML = '<p style="padding:15px; color:#555; text-align:center;">No direct media listings found.</p>';
                return;
            }

            items.forEach(item => {
                const type = item.media_type || (item.title ? 'movie' : 'tv');
                const title = item.title || item.name;
                const releaseDate = item.release_date || item.first_air_date || '';
                const year = releaseDate ? releaseDate.split('-')[0] : 'N/A';
                const posterPath = item.poster_path 
                    ? `https://image.tmdb.org/t/p/w92${item.poster_path}` 
                    : 'https://via.placeholder.com/65x95?text=No+Poster';

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => selectMedia(item.id, type);

                card.innerHTML = `
                    <img src="${posterPath}" alt="${title}">
                    <div class="movie-info">
                        <div class="movie-title">${title}</div>
                        <div class="movie-meta">${type.toUpperCase()} • ${year}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function selectMedia(id, type) {
            currentMediaId = id;
            currentMediaType = type;
            armShield(); 

            if (type === 'movie') {
                document.getElementById('tvControls').style.display = 'none';
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?language=en-US`, fetchOptions);
                    const details = await res.json();
                    const imdbId = details.imdb_id;
                    const targetedId = imdbId ? imdbId : id;
                    
                    document.getElementById('videoPlayer').src = `https://vidcore.net/movie/${targetedId}`;
                } catch (err) {
                    document.getElementById('videoPlayer').src = `https://vidcore.net/movie/${id}`;
                }
            } else if (type === 'tv') {
                document.getElementById('tvControls').style.display = 'flex';
                document.getElementById('seasonNum').value = 1;
                document.getElementById('episodeNum').value = 1;
                loadTvMedia();
            }
        }

        function loadTvMedia() {
            armShield(); 
            const season = document.getElementById('seasonNum').value;
            const episode = document.getElementById('episodeNum').value;
            document.getElementById('videoPlayer').src = `https://vidcore.net/tv/${currentMediaId}/${season}/${episode}?nextButton=true&autoNext=true&autoPlay=true`;
        }

        function changeEpisode(increment) {
            const epInput = document.getElementById('episodeNum');
            let currentEp = parseInt(epInput.value) || 1;
            currentEp += increment;
            if (currentEp < 1) currentEp = 1;
            epInput.value = currentEp;
            loadTvMedia();
        }
    </script>
</body>
</html>
