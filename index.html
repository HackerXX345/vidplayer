<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Cinema Browser</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0c0c0c;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px 25px;
            background: #141414;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            gap: 15px;
        }

        header h1 {
            color: #E50914;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .search-box {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 450px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            outline: none;
            font-size: 0.95rem;
        }

        .search-box input:focus {
            border-color: #E50914;
        }

        .search-box button {
            padding: 10px 22px;
            background: #E50914;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar Layout */
        .sidebar {
            width: 360px;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 1rem;
            padding: 15px 20px;
            color: #888;
            border-bottom: 1px solid #222;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .movie-card {
            display: flex;
            gap: 15px;
            background: #181818;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .movie-card:hover {
            border-color: #333;
            background: #222;
        }

        .movie-card img {
            width: 65px;
            height: 95px;
            object-fit: cover;
            border-radius: 6px;
            background: #000;
        }

        .movie-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .movie-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .movie-meta {
            font-size: 0.8rem;
            color: #777;
        }

        /* Theater Area */
        .main-theater {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #050505;
            overflow-y: auto;
        }

        .player-viewport {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 1px solid #222;
        }

        #adShield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.01); 
            cursor: pointer;
            display: none; 
        }

        .player-viewport iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Control Bar (Server + TV Controls) */
        .control-bar {
            background: #141414;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid #222;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-bar label {
            font-size: 0.85rem;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }

        .control-bar select, .control-bar input {
            padding: 8px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        .control-bar select:focus, .control-bar input:focus {
            border-color: #E50914;
        }

        .control-bar input {
            width: 65px;
            text-align: center;
        }

        .tv-only {
            display: none; /* Hidden by default until a TV show is clicked */
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .next-btn {
            padding: 9px 18px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-left: auto;
        }

        .next-btn:hover {
            background: #E50914;
            border-color: #E50914;
        }

        /* Mobile Layout Adjustments */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
            }

            header h1 {
                text-align: center;
                font-size: 1.4rem;
            }

            .app-body {
                flex-direction: column-reverse;
                overflow: y;
                overflow-x: hidden;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-top: 1px solid #222;
                overflow: visible;
            }

            .results-list {
                overflow-y: visible;
            }

            .main-theater {
                padding: 15px;
                flex: none;
            }

            .control-bar {
                justify-content: space-between;
            }

            .control-group {
                width: 100%;
            }
            
            .control-group select {
                flex: 1; /* Make server dropdown full width on mobile */
            }

            .tv-only {
                width: 100%;
                justify-content: space-between;
            }

            .next-btn {
                margin-left: 0;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>THE Sajt</h1>
        <div class="search-box">
            <input type="text" id="searchQuery" placeholder="Search everything">
            <button onclick="searchMedia()">Search</button>
        </div>
    </header>

    <div class="app-body">
        <div class="sidebar">
            <h2 id="sidebarTitle">Trending Dynamic Feeds</h2>
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="main-theater">
            <div class="player-viewport">
                <div id="adShield" onclick="neutralizeShield()" title="Click to clear safety shield, then hit play."></div>
                <iframe 
                    id="videoPlayer"
                    src="about:blank" 
                    frameborder="0" 
                    allowfullscreen 
                    allow="encrypted-media">
                </iframe>
            </div>

            <div class="control-bar" id="controlBar">
                <div class="control-group">
                    <label>Server:</label>
                    <select id="serverSelect" onchange="refreshPlayer()">
                        <option value="vidcore">Vidcore (Fastest)</option>
                        <option value="vidsrcto">VidSrc.to</option>
                        <option value="vidsrcme">VidSrc.me (Fallback)</option>
                    </select>
                </div>

                <div class="tv-only" id="tvControls">
                    <div class="control-group">
                        <label>S</label>
                        <input type="number" id="seasonNum" value="1" min="1" onchange="refreshPlayer()">
                    </div>
                    <div class="control-group">
                        <label>Ep</label>
                        <input type="number" id="episodeNum" value="1" min="1" onchange="refreshPlayer()">
                    </div>
                    <button class="next-btn" onclick="changeEpisode(1)">Next Ep ➔</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Your TMDB API Read Access Token is integrated below:
        const TMDB_ACCESS_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIzYzMwZjRiMThjZTc0ODlmMzgzNDE2YzEwMmI0MjgwMyIsIm5iZiI6MTc4MDk0NzE2MS4wMTIsInN1YiI6IjZhMjcxOGQ5NzUwMTQ4Y2IxZWMzMzQ1YiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.2rw1VFYZHjDv8e7STG_HOBxqtYT6vTxmY5WvvoBebwY";

        let currentMediaId = ''; 
        let currentImdbId = '';
        let currentMediaType = 'movie'; 
        let shieldClicks = 0;

        const fetchOptions = {
            method: 'GET',
            headers: {
                accept: 'application/json',
                Authorization: `Bearer ${TMDB_ACCESS_TOKEN}`
            }
        };

        window.onload = fetchTrending;

        function armShield() {
            const shield = document.getElementById('adShield');
            shield.style.display = 'block'; 
            shieldClicks = 0; 
        }

        function neutralizeShield() {
            shieldClicks++;
            if (shieldClicks >= 2) { 
                document.getElementById('adShield').style.display = 'none';
            }
        }

        async function fetchTrending() {
            try {
                const response = await fetch('https://api.themoviedb.org/3/trending/all/day?language=en-US', fetchOptions);
                const data = await response.json();
                renderCards(data.results);
            } catch (err) {
                console.error("Failed fetching trending:", err);
            }
        }

        async function searchMedia() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) return;

            document.getElementById('sidebarTitle').innerText = `Results: ${query}`;
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/multi?query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`, fetchOptions);
                const data = await response.json();
                const filteredResults = data.results.filter(item => item.media_type === 'movie' || item.media_type === 'tv');
                renderCards(filteredResults);
            } catch (err) {
                console.error("Search error:", err);
            }
        }

        function renderCards(items) {
            const container = document.getElementById('resultsList');
            container.innerHTML = '';

            if(items.length === 0) {
                container.innerHTML = '<p style="padding:15px; color:#555; text-align:center;">No direct media listings found.</p>';
                return;
            }

            items.forEach(item => {
                const type = item.media_type || (item.title ? 'movie' : 'tv');
                const title = item.title || item.name;
                const releaseDate = item.release_date || item.first_air_date || '';
                const year = releaseDate ? releaseDate.split('-')[0] : 'N/A';
                const posterPath = item.poster_path 
                    ? `https://image.tmdb.org/t/p/w92${item.poster_path}` 
                    : 'https://via.placeholder.com/65x95?text=No+Poster';

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => selectMedia(item.id, type);

                card.innerHTML = `
                    <img src="${posterPath}" alt="${title}">
                    <div class="movie-info">
                        <div class="movie-title">${title}</div>
                        <div class="movie-meta">${type.toUpperCase()} • ${year}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function selectMedia(id, type) {
            currentMediaId = id;
            currentMediaType = type;
            currentImdbId = id; // Default fallback

            // Check if it's a movie and try to get the IMDB ID for Vidcore
            if (type === 'movie') {
                document.getElementById('tvControls').style.display = 'none';
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?language=en-US`, fetchOptions);
                    const details = await res.json();
                    if (details.imdb_id) currentImdbId = details.imdb_id;
                } catch (err) {
                    console.log("Could not fetch IMDB ID, falling back to TMDB ID");
                }
            } else {
                // Show TV controls and reset to S1E1
                document.getElementById('tvControls').style.display = 'flex';
                document.getElementById('seasonNum').value = 1;
                document.getElementById('episodeNum').value = 1;
            }

            refreshPlayer();

            // Mobile Auto-Scroll
            if(window.innerWidth <= 768) {
                document.querySelector('.main-theater').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // The master router function that formats URLs based on the active server
        function refreshPlayer() {
            armShield(); // Arm the popup shield on every source change
            
            const server = document.getElementById('serverSelect').value;
            const season = document.getElementById('seasonNum').value;
            const episode = document.getElementById('episodeNum').value;
            const player = document.getElementById('videoPlayer');

            if (currentMediaType === 'movie') {
                if (server === 'vidcore') {
                    player.src = `https://vidcore.net/movie/${currentImdbId}`;
                } else if (server === 'vidsrcto') {
                    player.src = `https://vidsrc.to/embed/movie/${currentMediaId}`;
                } else if (server === 'vidsrcme') {
                    player.src = `https://vidsrc.me/embed/movie?tmdb=${currentMediaId}`;
                }
            } else if (currentMediaType === 'tv') {
                if (server === 'vidcore') {
                    player.src = `https://vidcore.net/tv/${currentMediaId}/${season}/${episode}?nextButton=true&autoNext=true&autoPlay=true`;
                } else if (server === 'vidsrcto') {
                    player.src = `https://vidsrc.to/embed/tv/${currentMediaId}/${season}/${episode}`;
                } else if (server === 'vidsrcme') {
                    player.src = `https://vidsrc.me/embed/tv?tmdb=${currentMediaId}&season=${season}&episode=${episode}`;
                }
            }
        }

        function changeEpisode(increment) {
            const epInput = document.getElementById('episodeNum');
            let currentEp = parseInt(epInput.value) || 1;
            currentEp += increment;
            if (currentEp < 1) currentEp = 1;
            epInput.value = currentEp;
            refreshPlayer();
        }
    </script>
</body>
</html>
